<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMO KETERLAMBATAN RESULT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.card-custom {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
}

.memo-title {
    background: #00c6ff;
    color: black;
    font-weight: bold;
    padding: 10px;
    border-radius: 8px 8px 0 0;
}

.memo-content {
    background: #f8f9fa;
    color: black;
    padding: 15px;
    border-radius: 0 0 8px 8px;
}

.loading {
    text-align: center;
    padding: 20px;
}
</style>
</head>
<body>

<div class="container py-5">
    <div class="card card-custom shadow-lg">
        <h3 class="text-center mb-4">MEMO KETERLAMBATAN RESULT</h3>

        <div id="loading" class="loading">Memuat data...</div>
        <div id="memo-container"></div>

    </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw_-zPBaCJBCsIJ5grX3fyoexEm_jrkNP9GL7B7PQETFtfNRpp_dYR0GP0zJQmOw04/exec";

function loadData() {
    fetch(API_URL)
    .then(res => res.json())
    .then(data => {

        document.getElementById("loading").style.display = "none";

        let html = "";

        data.forEach(row => {

            // Karena ini format array (bukan object)
            // Kolom B = index 1
            // Kolom C = index 2

            const judul = row[1] || "";
            const isi = row[2] || "";

            if(judul.trim() !== "") {
                html += `
                    <div class="mb-4">
                        <div class="memo-title">${judul}</div>
                        <div class="memo-content">${isi}</div>
                    </div>
                `;
            }

        });

        document.getElementById("memo-container").innerHTML = html;

    })
    .catch(err => {
        document.getElementById("loading").innerHTML = "Gagal mengambil data!";
        console.error(err);
    });
}

loadData();

</script>

</body>
</html>
