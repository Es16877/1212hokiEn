<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Google Sheets - Kolom B & C</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .header h1 i {
            margin-right: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .sheet-info {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
        }
        
        .info-item i {
            color: #667eea;
            font-size: 1.2em;
        }
        
        .controls {
            padding: 20px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .search-box {
            flex: 1;
            position: relative;
            min-width: 250px;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: 'Roboto', sans-serif;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Roboto', sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #555;
            border: 2px solid #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .table-container {
            padding: 0 30px 30px 30px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
            padding: 15px;
            text-align: left;
            font-size: 1.1em;
        }
        
        th i {
            margin-right: 8px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        .row-number {
            font-weight: 500;
            color: #667eea;
            width: 60px;
        }
        
        .empty-data {
            color: #999;
            font-style: italic;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .loading i {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px 30px;
            margin: 20px 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #f5c6cb;
        }
        
        .error i {
            font-size: 1.5em;
        }
        
        .stats {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stats span {
            font-weight: 500;
            color: #333;
        }
        
        .export-options {
            display: flex;
            gap: 10px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .footer a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .sheet-info {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-google-sheets"></i>
                Google Sheets Data Viewer
            </h1>
            <p>Menampilkan data dari kolom B dan C</p>
        </div>
        
        <div class="sheet-info" id="sheetInfo">
            <div class="info-item">
                <i class="fas fa-spreadsheet"></i>
                <span>Loading sheet info...</span>
            </div>
            <div class="info-item">
                <i class="fas fa-clock"></i>
                <span id="lastUpdate">-</span>
            </div>
        </div>
        
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari data..." onkeyup="filterData()">
            </div>
            <button class="btn btn-primary" onclick="loadData()">
                <i class="fas fa-sync-alt"></i>
                Refresh Data
            </button>
            <button class="btn btn-success" onclick="exportToCSV()">
                <i class="fas fa-file-csv"></i>
                Export CSV
            </button>
            <button class="btn btn-secondary" onclick="exportToJSON()">
                <i class="fas fa-file-code"></i>
                Export JSON
            </button>
        </div>
        
        <div id="error" class="error" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorMessage"></span>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <i class="fas fa-spinner"></i>
            <p>Memuat data...</p>
        </div>
        
        <div class="table-container" id="tableContainer">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th><i class="fas fa-hashtag"></i> No</th>
                        <th><i class="fas fa-columns"></i> <span id="headerB">Kolom B</span></th>
                        <th><i class="fas fa-columns"></i> <span id="headerC">Kolom C</span></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 30px;">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 3em; color: #ccc; margin-bottom: 10px;"></i>
                            <p>Klik tombol Refresh untuk memuat data</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="stats" id="stats">
            <div class="info-item">
                <i class="fas fa-database"></i>
                <span id="totalRows">0</span> baris data
            </div>
            <div class="export-options">
                <span id="filterInfo"></span>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>Data diambil dari <a href="https://docs.google.com/spreadsheets/d/1fpGwJMTs9ViJyMNmIo0eJQAi1jSmA0a2MmhVxL_y-7s/edit" target="_blank">Google Sheets ini</a></p>
        <p style="opacity: 0.8; font-size: 0.9em;">&copy; 2024 - Google Sheets Data Viewer</p>
    </div>
    
    <script>
        let originalData = [];
        let filteredData = [];
        let headers = { b: 'Kolom B', c: 'Kolom C' };
        
        // Load data saat halaman dimuat
        window.onload = function() {
            loadData();
            loadSheetInfo();
        };
        
        // Fungsi untuk load data dari Google Apps Script
        function loadData() {
            showLoading(true);
            hideError();
            
            google.script.run
                .withSuccessHandler(displayData)
                .withFailureHandler(showError)
                .getSheetData();
        }
        
        // Fungsi untuk load info sheet
        function loadSheetInfo() {
            google.script.run
                .withSuccessHandler(displaySheetInfo)
                .withFailureHandler(console.error)
                .getSheetInfo();
        }
        
        // Fungsi untuk menampilkan data
        function displayData(result) {
            showLoading(false);
            
            if (!result.success) {
                showError(result.message);
                return;
            }
            
            // Simpan data
            originalData = result.data || [];
            filteredData = [...originalData];
            headers = result.headers || { b: 'Kolom B', c: 'Kolom C' };
            
            // Update header
            document.getElementById('headerB').textContent = headers.b;
            document.getElementById('headerC').textContent = headers.c;
            
            // Update last update
            document.getElementById('lastUpdate').textContent = result.lastUpdated || new Date().toLocaleString();
            
            // Tampilkan data di tabel
            renderTable(filteredData);
            
            // Update stats
            document.getElementById('totalRows').textContent = originalData.length;
            document.getElementById('filterInfo').innerHTML = '';
        }
        
        // Fungsi untuk menampilkan info sheet
        function displaySheetInfo(info) {
            if (info.success) {
                const sheetInfo = document.getElementById('sheetInfo');
                sheetInfo.innerHTML = `
                    <div class="info-item">
                        <i class="fas fa-spreadsheet"></i>
                        <span>${info.spreadsheetName} - ${info.worksheetName}</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <span id="lastUpdate">${info.lastUpdated}</span>
                    </div>
                `;
            }
        }
        
        // Fungsi untuk render tabel
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 30px;">
                            <i class="fas fa-search" style="font-size: 3em; color: #ccc; margin-bottom: 10px;"></i>
                            <p>Tidak ada data ditemukan</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            data.forEach((item, index) => {
                const bValue = item.b || item[headers.b] || '';
                const cValue = item.c || item[headers.c] || '';
                
                html += `
                    <tr>
                        <td class="row-number">${index + 1}</td>
                        <td>${bValue || '<span class="empty-data">- kosong -</span>'}</td>
                        <td>${cValue || '<span class="empty-data">- kosong -</span>'}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // Fungsi untuk filter data
        function filterData() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchText) {
                filteredData = [...originalData];
                document.getElementById('filterInfo').innerHTML = '';
            } else {
                filteredData = originalData.filter(item => {
                    const bValue = (item.b || '').toLowerCase();
                    const cValue = (item.c || '').toLowerCase();
                    return bValue.includes(searchText) || cValue.includes(searchText);
                });
                
                document.getElementById('filterInfo').innerHTML = 
                    `Menampilkan ${filteredData.length} dari ${originalData.length} data`;
            }
            
            renderTable(filteredData);
        }
        
        // Fungsi untuk export ke CSV
        function exportToCSV() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diexport');
                return;
            }
            
            let csv = `${headers.b},${headers.c}\n`;
            
            filteredData.forEach(item => {
                const bValue = (item.b || '').replace(/,/g, ';');
                const cValue = (item.c || '').replace(/,/g, ';');
                csv += `${bValue},${cValue}\n`;
            });
            
            downloadFile(csv, 'data_google_sheets.csv', 'text/csv');
        }
        
        // Fungsi untuk export ke JSON
        function exportToJSON() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diexport');
                return;
            }
            
            const json = JSON.stringify(filteredData, null, 2);
            downloadFile(json, 'data_google_sheets.json', 'application/json');
        }
        
        // Fungsi untuk download file
        function downloadFile(content, fileName, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Fungsi untuk show/hide loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        // Fungsi untuk show error
        function showError(message) {
            document.getElementById('error').style.display = 'flex';
            document.getElementById('errorMessage').textContent = message || 'Terjadi kesalahan saat memuat data';
            showLoading(false);
        }
        
        // Fungsi untuk hide error
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        // Auto refresh setiap 5 menit
        setInterval(loadData, 300000);
    </script>
</body>
</html>
