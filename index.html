<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMO KETERLAMBATAN RESULT</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
}

.card-custom {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

.table thead {
    background: rgba(255,255,255,0.1);
}

.loading {
    text-align: center;
    padding: 20px;
}
</style>
</head>
<body>

<div class="container py-5">
    <div class="card card-custom p-4 shadow-lg">

        <h3 class="mb-4 text-center">MEMO KETERLAMBATAN RESULT</h3>

        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Cari data...">
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-light" onclick="loadData()">Refresh</button>
            </div>
        </div>

        <div id="loading" class="loading">Memuat data...</div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover table-dark align-middle">
                <thead>
                    <tr id="table-head"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

    </div>
</div>

<script>

const API_URL = "URL_WEB_APP_KAMU"; // GANTI INI

let originalData = [];

function loadData() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("table-body").innerHTML = "";

    fetch(API_URL)
    .then(res => res.json())
    .then(data => {

        originalData = data;
        document.getElementById("loading").style.display = "none";

        if(data.length === 0) {
            document.getElementById("table-body").innerHTML =
                "<tr><td colspan='10' class='text-center'>Tidak ada data</td></tr>";
            return;
        }

        generateTable(data);

    })
    .catch(err => {
        document.getElementById("loading").innerHTML =
            "Gagal mengambil data!";
        console.error(err);
    });
}

function generateTable(data) {

    const tableHead = document.getElementById("table-head");
    const tableBody = document.getElementById("table-body");

    tableHead.innerHTML = "";
    tableBody.innerHTML = "";

    // Buat Header Otomatis
    Object.keys(data[0]).forEach(key => {
        tableHead.innerHTML += `<th>${key}</th>`;
    });

    // Isi Data
    data.forEach(row => {
        let rowHtml = "<tr>";
        Object.values(row).forEach(value => {
            rowHtml += `<td>${value ?? ""}</td>`;
        });
        rowHtml += "</tr>";
        tableBody.innerHTML += rowHtml;
    });
}

document.getElementById("searchInput").addEventListener("keyup", function() {
    const keyword = this.value.toLowerCase();

    const filtered = originalData.filter(row =>
        Object.values(row).some(val =>
            String(val).toLowerCase().includes(keyword)
        )
    );

    generateTable(filtered);
});

loadData();

</script>

</body>
</html>
